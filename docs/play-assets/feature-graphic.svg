<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F1E1B"/>
      <stop offset="0.55" stop-color="#181715"/>
      <stop offset="1" stop-color="#141413"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E0916F"/>
      <stop offset="1" stop-color="#CC785C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#CC785C" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#CC785C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#glow)"/>

  <!-- subtle grid texture -->
  <g stroke="#FAF9F5" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="125" x2="1024" y2="125"/>
    <line x1="0" y1="250" x2="1024" y2="250"/>
    <line x1="0" y1="375" x2="1024" y2="375"/>
  </g>

  <!-- loop motif: a circular arrow breaking open ("out") -->
  <g transform="translate(828 232)">
    <circle r="118" fill="none" stroke="#252320" stroke-width="26"/>
    <!-- terracotta progress arc, leaving a gap = breaking the loop -->
    <path d="M 0 -118 A 118 118 0 1 1 -83.4 83.4"
          fill="none" stroke="url(#accent)" stroke-width="26" stroke-linecap="round"/>
    <!-- arrow head flying out of the loop -->
    <g transform="translate(-83.4 83.4) rotate(135)">
      <path d="M 0 -22 L 30 0 L 0 22 Z" fill="#E0916F"/>
    </g>
    <!-- center dot -->
    <circle r="13" fill="#CC785C"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="232" font-family="Helvetica, Arial, sans-serif" font-size="104"
        font-weight="700" fill="#FAF9F5" letter-spacing="-2">LoopOut</text>

  <!-- tagline -->
  <text x="84" y="296" font-family="Helvetica, Arial, sans-serif" font-size="33"
        font-weight="500" fill="#CC785C">Break the scroll. Reclaim your time.</text>

  <!-- supporting line -->
  <text x="84" y="350" font-family="Helvetica, Arial, sans-serif" font-size="25"
        font-weight="400" fill="#A09D96">Count &amp; limit reels, Shorts &amp; TikToks. Private, on-device.</text>
</svg>
